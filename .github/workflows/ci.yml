name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "Robot tag to run (e.g. sanity, Regression, newtest)"
        required: false
        default: "Regression"
      env:
        description: "Target environment (prod or local)"
        required: false
        default: "prod"

jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Robot Framework tests via Docker
        run: |
          ./run-docker-tests.sh \
            --include ${{ github.event.inputs.tags || 'Regression' }} \
            --variable BROWSER:chrome \
            --variable ENV:${{ github.event.inputs.env || 'prod' }} \
            testsuites/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results
